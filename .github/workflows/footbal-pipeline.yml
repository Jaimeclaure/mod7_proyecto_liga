name: Football Data Pipeline

# Controla cuándo se ejecuta el pipeline
on:
  push:
    branches:
      - rama_gsgs  # Se ejecuta cuando subes cambios a tu rama
  schedule:
    - cron: '0 18 * * *'  # Se ejecuta todos los días a las 18:00 UTC (ajusta según tu zona horaria)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio en el servidor de GitHub
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Configurar la versión de Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Versión estable para entorno de producción

    # 3. Instalar las dependencias del proyecto
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Autenticarse en Google Cloud usando el Secreto guardado
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 5. Ejecutar la Extracción de Datos
    - name: Run Extract Script
      env:
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      run: |
        python -m scripts.extract

    # 6. Ejecutar la Carga a Google Cloud Storage
    - name: Run Load Script
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        python -m scripts.load